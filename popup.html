<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCop Security Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            width: 380px;
            min-height: 500px;
        }
        
        .dashboard-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            margin: 10px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .shield-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 12px;
            color: #a8d8ff;
            margin-top: 5px;
        }
        
        .protection-status {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 2px 10px rgba(40, 167, 69, 0.3);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #a8d8ff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .safe { color: #28a745; }
        .warning { color: #ffc107; }
        .dangerous { color: #dc3545; }
        .scanned { color: #17a2b8; }
        
        .threat-indicator {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .threat-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .threat-levels {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .threat-level {
            display: flex;
            align-items: center;
            font-size: 12px;
        }
        
        .threat-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .ai-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .ai-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        
        .ai-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .ai-input-group {
            margin-bottom: 10px;
        }
        
        .ai-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 12px;
            outline: none;
        }
        
        .ai-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .ai-input:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .ai-button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .ai-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .control-button {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .control-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .control-button.active {
            background: linear-gradient(135deg, #28a745, #20c997);
            border-color: #28a745;
        }
        
        .footer {
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .version {
            margin-bottom: 5px;
        }
        
        .help-link {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
        }
        
        .help-link:hover {
            text-decoration: underline;
        }
        
        .last-updated {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="logo-section">
                <div class="shield-icon">🛡️</div>
                <div>
                    <h1>CyberCop Security</h1>
                    <div class="subtitle">WhatsApp Protection System</div>
                </div>
            </div>
        </div>
        
        <div class="protection-status">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="status-text">PROTECTION ACTIVE</span>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number scanned" id="scanned-count">0</div>
                <div class="stat-label">Messages Scanned</div>
            </div>
            <div class="stat-card">
                <div class="stat-number safe" id="safe-count">0</div>
                <div class="stat-label">Safe Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-number warning" id="suspicious-count">0</div>
                <div class="stat-label">Suspicious</div>
            </div>
            <div class="stat-card">
                <div class="stat-number dangerous" id="scam-count">0</div>
                <div class="stat-label">Scams Detected</div>
            </div>
        </div>
        
        <div class="threat-indicator">
            <div class="threat-title">Threat Detection Levels</div>
            <div class="threat-levels">
                <div class="threat-level">
                    <div class="threat-color" style="background: #28a745;"></div>
                    <span>Safe</span>
                </div>
                <div class="threat-level">
                    <div class="threat-color" style="background: #ffc107;"></div>
                    <span>Warning</span>
                </div>
                <div class="threat-level">
                    <div class="threat-color" style="background: #dc3545;"></div>
                    <span>Dangerous</span>
                </div>
            </div>
        </div>
        
        <div class="ai-section">
            <div class="ai-header">
                <div class="ai-title">🤖 AI Enhancement</div>
                <div class="ai-status" id="ai-status">DISABLED</div>
            </div>
            <div class="ai-input-group">
                <input type="password" 
                       id="api-key-input" 
                       class="ai-input" 
                       placeholder="Enter OpenAI API Key (optional)">
            </div>
            <button id="save-api-key" class="ai-button">Save API Key</button>
        </div>
        
        <div class="controls">
            <div class="control-button active" id="toggle-scan">
                Scanning ON
            </div>
            <div class="control-button" id="reset-stats">
                Reset Stats
            </div>
        </div>
        
        <div class="footer">
            <div class="version">Version 2.0.0 - Enhanced</div>
            <div>
                <a href="#" class="help-link" id="help-link">Help & Support</a>
            </div>
            <div class="last-updated" id="last-updated">Last updated: Never</div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
